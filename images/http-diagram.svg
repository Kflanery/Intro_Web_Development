<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">HTTP request and response diagram</title>
  <desc id="desc">A browser sends an HTTP request to a server, and the server sends an HTTP response back.</desc>
  <rect width="800" height="420" fill="#f5f7fa"/>
  <rect x="70" y="110" width="220" height="180" rx="16" fill="#dfe8f1" stroke="#14324a" stroke-width="3"/>
  <rect x="510" y="110" width="220" height="180" rx="16" fill="#dfe8f1" stroke="#14324a" stroke-width="3"/>
  <text x="180" y="170" text-anchor="middle" font-family="Arial" font-size="34" fill="#14324a">Browser</text>
  <text x="180" y="215" text-anchor="middle" font-family="Arial" font-size="22" fill="#14324a">Client</text>
  <text x="620" y="170" text-anchor="middle" font-family="Arial" font-size="34" fill="#14324a">Web Server</text>
  <text x="620" y="215" text-anchor="middle" font-family="Arial" font-size="22" fill="#14324a">Host Resource</text>
  <line x1="290" y1="170" x2="500" y2="170" stroke="#114d7a" stroke-width="6"/>
  <polygon points="500,170 482,160 482,180" fill="#114d7a"/>
  <text x="395" y="145" text-anchor="middle" font-family="Arial" font-size="24" fill="#114d7a">HTTP Request</text>
  <line x1="510" y1="240" x2="300" y2="240" stroke="#2d6a4f" stroke-width="6"/>
  <polygon points="300,240 318,230 318,250" fill="#2d6a4f"/>
  <text x="405" y="270" text-anchor="middle" font-family="Arial" font-size="24" fill="#2d6a4f">HTTP Response</text>
</svg>
